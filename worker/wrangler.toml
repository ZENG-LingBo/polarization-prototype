name = "defuselab-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Encrypted secrets (NOT stored here) — set with wrangler:
#   npx wrangler secret put ANTHROPIC_API_KEY     (required)
#   npx wrangler secret put TURNSTILE_SECRET       (optional — enables Turnstile gate)

# Per-IP daily cap (optional). Enable by creating a KV namespace and uncommenting:
#   npx wrangler kv namespace create RL
# then paste the printed id below and redeploy.
# [[kv_namespaces]]
# binding = "RL"
# id = "<your-kv-namespace-id>"

[vars]
DAILY_CAP = "50"
